name: Build fnt
# 远程遥控其他仓库构建字体
# 需要 PAT 以触发工作流程，在 Settings > Secrets 中添加 MAIN_REPO_PAT
# PAT 权限需要包含 write contents

on:
  workflow_dispatch:
    inputs:
      commit_build_result:
        description: '将构建结果提交到仓库'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger workflow in other repos
        run: |
          # Set the required variables
          repo_owner="NightFurySL2001"
          repo_names=("LxgwWenKai", "LxgwWenKai-Lite")
          event_type="build"

          for repo_name in "${repo_names[@]}"; do
            curl -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.MAIN_REPO_PAT }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/$repo_owner/$repo_name/dispatches \
              -d '{
                "event_type": "'"$event_type"'",
                "client_payload": {
                  "commit_build_result": ${{ github.event.inputs.commit_build_result }}
              }'
          done